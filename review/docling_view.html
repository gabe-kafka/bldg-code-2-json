<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>DOCLING — Result Viewer</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  :root{--bg:#FFF;--surface:#F5F5F5;--text:#1A1A1A;--muted:#6B6B6B;--dim:#505050;--border:#D4D4D4;--subtle:#E8E8E8;--accent:#0057FF;--red:#DC2626;--amber:#D97706;--green:#16A34A;--cyan:#06B6D4;--canvas-bg:#E0E0E0;--overlay-bg:rgba(255,255,255,0.85)}
  @media(prefers-color-scheme:dark){:root{--bg:#0A0A0A;--surface:#141414;--text:#E5E5E5;--muted:#808080;--dim:#606060;--border:#2A2A2A;--subtle:#1A1A1A;--accent:#3B82F6;--red:#DC2626;--amber:#D97706;--green:#16A34A;--cyan:#06B6D4;--canvas-bg:#050505;--overlay-bg:rgba(0,0,0,0.8)}}
  html,body{height:100%;background:var(--bg);color:var(--text);font-family:'JetBrains Mono','SF Mono',monospace;font-size:12px;overflow:hidden}
  .bar{height:24px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 8px;gap:12px;font-size:10px;color:var(--muted)}
  .bar .t{color:var(--text);font-weight:500;text-transform:uppercase;letter-spacing:.08em}
  .bar .sep{color:var(--border)}
  .bar b{color:var(--text);font-weight:400}
  .main{display:grid;grid-template-columns:1fr 320px;height:calc(100vh - 24px)}
  .cvs{position:relative;overflow:hidden;background:var(--canvas-bg)}
  .cvs canvas{position:absolute;top:0;left:0}
  .side{display:flex;flex-direction:column;border-left:1px solid var(--border);background:var(--surface)}
  .pnav{display:flex;align-items:center;border-bottom:1px solid var(--border);padding:4px 6px;gap:4px}
  .pnav .lbl{font-size:8px;text-transform:uppercase;letter-spacing:.1em;color:var(--muted)}
  .pnav .pg{font-size:12px;min-width:36px;text-align:center;font-variant-numeric:tabular-nums}
  .b{background:var(--subtle);border:1px solid var(--border);color:var(--muted);padding:2px 8px;cursor:pointer;font-family:inherit;font-size:10px;text-transform:uppercase;letter-spacing:.05em}
  .b:hover{color:var(--text);border-color:var(--dim)}
  .b:disabled{opacity:.3}
  .sp{flex:1}
  /* LEGEND */
  .legend{padding:4px 6px;border-bottom:1px solid var(--border);display:flex;flex-wrap:wrap;gap:6px}
  .leg-item{display:flex;align-items:center;gap:3px;font-size:9px;color:var(--dim);cursor:pointer}
  .leg-item.off{opacity:.3}
  .leg-dot{width:8px;height:8px;border-radius:1px}
  /* ELEMENT LIST */
  .elist{flex:1;overflow-y:auto}
  .eitem{padding:3px 6px;border-bottom:1px solid var(--bg);cursor:pointer;font-size:10px}
  .eitem:hover{background:var(--subtle)}
  .eitem.sel{background:var(--accent);background:rgba(59,130,246,0.1);border-left:2px solid var(--accent);padding-left:4px}
  .eitem .elbl{font-size:8px;text-transform:uppercase;letter-spacing:.05em;padding:0 3px;border:1px solid;display:inline-block;margin-right:4px}
  .eitem .etxt{color:var(--dim);font-size:9px;display:block;margin-top:1px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  /* STATS */
  .stats{padding:4px 6px;border-top:1px solid var(--border);font-size:9px;color:var(--dim)}
</style>
</head>
<body>
<div class="bar">
  <span class="t">docling viewer</span><span class="sep">|</span>
  <span>PAGE <b id="sbPg">-</b>/<b id="sbTot">-</b></span><span class="sep">|</span>
  <span>ELEMENTS <b id="sbEl">-</b></span>
</div>
<div class="main">
  <div class="cvs" id="cvs">
    <canvas id="cI"></canvas><canvas id="cB"></canvas>
  </div>
  <div class="side">
    <div class="pnav">
      <span class="lbl">PAGE</span>
      <button class="b" id="prev" onclick="nav(-1)">&lt;</button>
      <span class="pg" id="pgN">-</span>
      <button class="b" id="next" onclick="nav(1)">&gt;</button>
      <span class="sp"></span>
      <label style="font-size:9px;color:var(--dim)"><input type="checkbox" id="showBoxes" checked onchange="redraw()"> BOXES</label>
    </div>
    <div class="legend" id="legend"></div>
    <div class="elist" id="elist"></div>
    <div class="stats" id="stats"></div>
  </div>
</div>
<script>
const cI=document.getElementById('cI'),cB=document.getElementById('cB');
let ctxI=cI.getContext('2d'),ctxB=cB.getContext('2d');
let data=null,pgIdx=0,img=null,zoom=1,panX=0,panY=0,dpr=1,selIdx=-1;
let hiddenLabels=new Set();

const COLORS={
  page_header:{s:'#808080',f:'rgba(128,128,128,0.06)'},
  section_header:{s:'#DC2626',f:'rgba(220,38,38,0.12)'},
  title:{s:'#DC2626',f:'rgba(220,38,38,0.15)'},
  text:{s:'#16A34A',f:'rgba(22,163,74,0.10)'},
  list_item:{s:'#16A34A',f:'rgba(22,163,74,0.08)'},
  table:{s:'#06B6D4',f:'rgba(6,182,212,0.12)'},
  picture:{s:'#D97706',f:'rgba(217,119,6,0.12)'},
  formula:{s:'#3B82F6',f:'rgba(59,130,246,0.12)'},
  caption:{s:'#8B5CF6',f:'rgba(139,92,246,0.10)'},
  footnote:{s:'#808080',f:'rgba(128,128,128,0.06)'},
  page_footer:{s:'#808080',f:'rgba(128,128,128,0.06)'},
};
function getColor(label){return COLORS[label]||{s:'#808080',f:'rgba(128,128,128,0.08)'};}

(async()=>{
  data=await fetch('/api/data').then(r=>r.json());
  document.getElementById('sbTot').textContent=data.pages.length;
  buildLegend();
  if(data.pages.length)load(0);
})();

function buildLegend(){
  const all=new Set();
  Object.values(data.elements).forEach(els=>els.forEach(e=>all.add(e.label)));
  const leg=document.getElementById('legend');
  leg.innerHTML='';
  [...all].sort().forEach(label=>{
    const c=getColor(label);
    const item=document.createElement('span');
    item.className='leg-item';
    item.innerHTML=`<span class="leg-dot" style="background:${c.s}"></span>${label}`;
    item.onclick=()=>{
      if(hiddenLabels.has(label))hiddenLabels.delete(label);else hiddenLabels.add(label);
      item.classList.toggle('off');
      redraw();renderList();
    };
    leg.appendChild(item);
  });
}

function load(i){
  pgIdx=i;selIdx=-1;
  const pg=data.pages[i];
  document.getElementById('pgN').textContent=pg.index;
  document.getElementById('sbPg').textContent=pg.index;
  document.getElementById('prev').disabled=i===0;
  document.getElementById('next').disabled=i===data.pages.length-1;
  const im=new Image();
  im.onload=()=>{img=im;const w=document.getElementById('cvs');zoom=Math.min(w.clientWidth/im.width,w.clientHeight/im.height);panX=0;panY=0;resize();redraw();renderList()};
  im.src=`/api/img/${pg.filename}`;
}
function nav(d){const n=pgIdx+d;if(n>=0&&n<data.pages.length)load(n);}

function resize(){
  dpr=window.devicePixelRatio||1;
  const w=document.getElementById('cvs'),W=w.clientWidth,H=w.clientHeight;
  for(const c of[cI,cB]){c.width=W*dpr;c.height=H*dpr;c.style.width=W+'px';c.style.height=H+'px';}
  ctxI=cI.getContext('2d');ctxI.scale(dpr,dpr);
  ctxB=cB.getContext('2d');ctxB.scale(dpr,dpr);
}

function redraw(){
  if(!img)return;
  const W=cI.width/dpr,H=cI.height/dpr;
  ctxI.clearRect(0,0,W,H);ctxI.save();ctxI.translate(panX,panY);ctxI.scale(zoom,zoom);ctxI.drawImage(img,0,0);ctxI.restore();
  ctxB.clearRect(0,0,W,H);
  if(!document.getElementById('showBoxes').checked)return;
  const pg=data.pages[pgIdx];
  const els=data.elements[String(pg.index)]||[];
  const ac=getComputedStyle(document.documentElement).getPropertyValue('--accent').trim();
  els.forEach((e,i)=>{
    if(hiddenLabels.has(e.label))return;
    const c=getColor(e.label);
    const sx=e.x0*zoom+panX,sy=e.y0*zoom+panY,sw=(e.x1-e.x0)*zoom,sh=(e.y1-e.y0)*zoom;
    ctxB.fillStyle=c.f;ctxB.fillRect(sx,sy,sw,sh);
    ctxB.strokeStyle=i===selIdx?ac:c.s;ctxB.lineWidth=i===selIdx?2:1;
    ctxB.strokeRect(sx,sy,sw,sh);
    ctxB.font='8px "JetBrains Mono",monospace';
    const lbl=e.label;
    const ly=sy<10?sy+1:sy-9;
    ctxB.fillStyle=getComputedStyle(document.documentElement).getPropertyValue('--overlay-bg').trim();
    ctxB.fillRect(sx,ly,ctxB.measureText(lbl).width+4,9);
    ctxB.fillStyle=c.s;ctxB.fillText(lbl,sx+2,ly+7);
  });
}

function renderList(){
  const pg=data.pages[pgIdx];
  const els=(data.elements[String(pg.index)]||[]).filter(e=>!hiddenLabels.has(e.label));
  document.getElementById('sbEl').textContent=els.length;
  const list=document.getElementById('elist');list.innerHTML='';
  els.forEach((e,i)=>{
    const d=document.createElement('div');
    d.className='eitem'+(i===selIdx?' sel':'');
    const c=getColor(e.label);
    d.innerHTML=`<span class="elbl" style="border-color:${c.s};color:${c.s}">${e.label}</span>${(e.x1-e.x0)}x${(e.y1-e.y0)}<span class="etxt">${e.text||''}</span>`;
    d.onclick=()=>{selIdx=i;renderList();redraw()};
    list.appendChild(d);
  });
  // Stats
  const counts={};els.forEach(e=>{counts[e.label]=(counts[e.label]||0)+1});
  document.getElementById('stats').textContent=Object.entries(counts).map(([k,v])=>`${k}:${v}`).join(' · ');
}

// Pan/zoom
cB.addEventListener('wheel',e=>{
  e.preventDefault();
  if(e.ctrlKey){const oz=zoom;zoom=Math.max(.1,Math.min(5,zoom-e.deltaY*.01));const mx=e.offsetX,my=e.offsetY;panX=mx-(mx-panX)*(zoom/oz);panY=my-(my-panY)*(zoom/oz);}
  else{panX-=e.deltaX;panY-=e.deltaY;}
  redraw();
},{passive:false});
let gsz=1;
cB.addEventListener('gesturestart',e=>{e.preventDefault();gsz=zoom});
cB.addEventListener('gesturechange',e=>{e.preventDefault();const oz=zoom;zoom=Math.max(.1,Math.min(5,gsz*e.scale));const r=cB.getBoundingClientRect(),mx=e.clientX-r.left,my=e.clientY-r.top;panX=mx-(mx-panX)*(zoom/oz);panY=my-(my-panY)*(zoom/oz);redraw()});
cB.addEventListener('gestureend',e=>e.preventDefault());

// Click to select
cB.addEventListener('mousedown',e=>{
  const mx=e.offsetX,my=e.offsetY;
  const pg=data.pages[pgIdx];
  const els=(data.elements[String(pg.index)]||[]).filter(el=>!hiddenLabels.has(el.label));
  for(let i=els.length-1;i>=0;i--){
    const el=els[i],sx=el.x0*zoom+panX,sy=el.y0*zoom+panY,sw=(el.x1-el.x0)*zoom,sh=(el.y1-el.y0)*zoom;
    if(mx>=sx&&mx<=sx+sw&&my>=sy&&my<=sy+sh){selIdx=i;renderList();redraw();return;}
  }
  selIdx=-1;renderList();redraw();
});

document.addEventListener('keydown',e=>{
  if(e.key==='ArrowLeft')nav(-1);
  else if(e.key==='ArrowRight')nav(1);
});
window.addEventListener('resize',()=>{resize();redraw()});
</script>
</body>
</html>
