ferences": [], "metadata": {"extracted_by": "auto", "qc_status": "pending", "qc_notes": "heading"}}, {"id": "ASCE7-22-26.2-D7", "type": "definition", "source": {"standard": "ASCE 7-22", "chapter": 26, "section": "26.2", "citation": "Section 26.2", "page": 3}, "title": "Definition: SHAPED", "description": "", "data": {"term": "SHAPED", "definition": "A building or other structure that has no unusual geometrical irregularity in spatial form."}, "cross_references": [], "metadata": {"extracted_by": "auto", "qc_status": "pending", "qc_notes": "split_from_text"}}, {"id": "ASCE7-22-26.2-D8", "type": "definition", "source": {"standard": "ASCE 7-22", "chapter": 26, "section": "26.2", "citation": "Section 26.2", "page": 3}, "title": "Definition: BUILDING OR OTHER STRUCTURE, RIGID", "description": "", "data": {"term": "BUILDING OR OTHER STRUCTURE, RIGID", "definition": "A build- ing or other structure whose fundamental frequency is greater than or equal to 1 Hz. COMPONENTS AND CLADDING (C&C): Elements of the building envelope or elements of building appurtenances and rooftop structures and equipment that do not qualify as part of the MWFRS."}, "cross_references": [], "metadata": {"extracted_by": "auto", "qc_status": "pending", "qc_notes": "split_from_text"}}, {"id": "ASCE7-22-26.2-D9", "type": "definition", "source": {"standard": "ASCE 7-22", "chapter": 26, "section": "26.2", "citation": "Section 26.2", "page": 3}, "title": "Definition: DESIGN FORCE, F", "description": "", "data": {"term": "DESIGN FORCE, F", "definition": "Equivalent static force to be used in the determination of wind loads for other structures. DESIGN PRESSURE, p: Equivalent static pressure to be used in the determination of wind loads for buildings."}, "cross_references": [], "metadata": {"extracted_by": "auto", "qc_status": "pending", "qc_notes": "split_from_text"}}, {"id": "ASCE7-22-26.2-D10", "type": "definition", "source": {"standard": "ASCE 7-22", "chapter": 26, "section": "26.2", "citation": "Section 26.2", "page": 3}, "title": "Definition: DIAPHRAGM", "description": "", "data": {"term": "DIAPHRAGM", "definition": "Roof, oor, or other membrane or bracing system acting to transfer lateral forces to the vertical MWFRS. For analysis under wind loads, diaphragms constructed of untopped steel decks, concrete- lled steel decks, and concrete slabs, each having a span-to-depth ratio of 2 or less, shall be permitted to be idealized as rigid. Diaphragms constructed of wood structural panels are permitted to be idealized as exible."}, "cross_references": [], "metadata": {"extracted_by": "auto", "qc_status": "pending", "qc_notes": "split_from_text"}}, {"id": "ASCE7-22-26.2-D11", "type": "definition", "source": {"standard": "ASCE 7-22", "chapter": 26, "section": "26.2", "citation": "Section 26.2", "page": 3}, "title": "Definition: DIRECTIONAL PROCEDURE", "description": "", "data": {"term": "DIRECTIONAL PROCEDURE", "definition": "A procedure for determin- ing wind loads on buildings and other structures for speci c wind directions, in which the external pressure coefficients used are based on past wind tunnel testing of prototypical building models for the corresponding direction of wind. EAVE HEIGHT, h : The distance from the ground surface e adjacent to the building to the roof eave line at a particular wall. If the height of the eave varies along the wall, the average height shall be used."}, "cross_references": [], "metadata": {"extracted_by": "auto", "qc_status": "pending", "qc_notes": "split_from_text"}}, {"id": "ASCE7-22-26.2-D12", "type": "definition", "source": {"standard": "ASCE 7-22", "chapter": 26, "section": "26.2", "citation": "Section 26.2", "page": 3}, "title": "Definition: EFFECTIVE WIND AREA, A", "description": "", "data": {"term": "EFFECTIVE WIND AREA, A", "definition": "The area used to determine the external pressure coefficient, (GC ) and (GC ). For C&C p rn elements, the effective wind area in Figures 30.3-1 through 30.3-7, 30.4-1, 30.5-1, and 30.7-1 through 30.7-3 is the span length multiplied by an effective width that need not be less than one- third the span length. For rooftop solar arrays, the effective wind area in Figure 29.4-7 is equal to the tributary area for the structural element being considered, except that the width of the effective wind area need not be less than one-third its length. For cladding fasteners, the effective wind area shall not be greater than the area that is tributary to an individual fastener."}, "cross_references": [], "metadata": {"extracted_by": "auto", "qc_status": "pending", "qc_notes": "split_from_text"}}, {"id": "ASCE7-22-26.2-D13", "type": "definition", "source": {"standard": "ASCE 7-22", "chapter": 26, "section": "26.2", "citation": "Section 26.2", "page": 3}, "title": "Definition: ENVELOPE PROCEDURE", "description": "", "data": {"term": "ENVELOPE PROCEDURE", "definition": "A procedure for determining wind load cases on buildings in which pseudoexternal pressure coefficients are derived from past wind tunnel testing of proto- typical building models successively rotated through 360 degrees, such that the pseudopressure cases produce key struc- tural actions (e.g., uplift, horizontal shear, and bending moments) that envelop their maximum values among all possible wind directions."}, "cross_references": [], "metadata": {"extracted_by": "auto", "qc_status": "pending", "qc_notes": "split_from_text"}}, {"id": "ASCE7-22-26.2-D14", "type": "definition", "source": {"standard": "ASCE 7-22", "chapter": 26, "section": "26.2", "citation": "Section 26.2", "page": 3}, "title": "Definition: ESCARPMENT", "description": "", "data": {"term": "ESCARPMENT", "definition": "With respect to topographic effects in Section 26.8, a cliff or steep slope generally separating two levels or gently sloping areas (see Figure 26.8-1). Also known as a scarp."}, "cross_references": [], "metadata": {"extracted_by": "auto", "qc_status": "pending", "qc_notes": "split_from_text"}}, {"id": "ASCE7-22-26.2-D15", "type": "definition", "source": {"standard": "ASCE 7-22", "chapter": 26, "section": "26.2", "citation": "Section 26.2", "page": 3}, "title": "Definition: FREE ROOF", "description": "", "data": {"term": "FREE ROOF", "definition": "A roof with a configuration generally con- forming to those shown in Figures 27.3-4 through 27.3-6 (mono- slope, pitched, or troughed) in an open building with no enclos- ing walls underneath the roof surface."}, "cross_references": [], "metadata": {"extracted_by": "auto", "qc_status": "pending", "qc_notes": "split_from_text"}}, {"id": "ASCE7-22-26.2-D16", "type": "definition", "source": {"standard": "ASCE 7-22", "chapter": 26, "section": "26.2", "citation": "Section 26.2", "page": 3}, "title": "Definition: GLAZING", "description": "", "data": {"term": "GLAZING", "definition": "Glass or transparent or translucent plastic sheet used in windows, doors, skylights, or curtain walls. GLAZING, IMPACT-"}, "cross_references": [], "metadata": {"extracted_by": "auto", "qc_status": "pending", "qc_notes": "split_from_text"}}, {"id": "ASCE7-22-26.2-D17", "type": "definition", "source": {"standard": "ASCE 7-22", "chapter": 26, "section": "26.2", "citation": "Section 26.2", "page": 3}, "title": "Definition: RESISTANT", "description": "", "data": {"term": "RESISTANT", "definition": "Glazing that has been shown by testing to withstand the impact of test missiles. See Section 26.12.3.2."}, "cross_references": [], "metadata": {"extracted_by": "auto", "qc_status": "pending", "qc_notes": "split_from_text"}}, {"id": "ASCE7-22-26.2-P1", "type": "provision", "source": {"standard": "ASCE 7-22", "chapter": 26, "section": "26.2", "citation": "Section 26.2", "page": 3}, "title": "Provision in Section 26.2", "description": "", "data": {"rule": "BUILDING OR OTHER STRUCTURE, REGULAR- SHAPED: A building or other structure that has no unusual geometrical irregularity in spatial form. BUILDING OR OTHER STRUCTURE, RIGID: A build- ing or other structure whose fundamental frequency is greater than or equal to 1 Hz. COMPONENTS AND CLADDING (C&C): Elements of the building envelope or elements of building appurtenances and rooftop structures and equipment that do not qualify as part of the MWFRS. DESIGN FORCE, F: Equivalent static force to be used in the determination of wind loads for other structures. DESIGN PRESSURE, p: Equivalent static pressure to be used in the determination of wind loads for buildings. DIAPHRAGM: Roof, oor, or other membrane or bracing system acting to transfer lateral forces to the vertical MWFRS. For analysis under wind loads, diaphragms constructed of untopped steel decks, concrete- lled steel decks, and concrete slabs, each having a span-to-depth ratio of 2 or less, shall be permitted to be idealized as rigid. Diaphragms constructed of wood structural panels are permitted to be idealized as exible. DIRECTIONAL PROCEDURE: A procedure for determin- ing wind loads on buildings and other structures for speci c wind directions, in which the external pressure coefficients used are based on past wind tunnel testing of prototypical building models for the corresponding direction of wind. EAVE HEIGHT, h : The distance from the ground surface e adjacent to the building to the roof eave line at a particular wall. If the height of the eave varies along the wall, the average height shall be used. EFFECTIVE WIND AREA, A: The area used to determine the external pressure coefficient, (GC ) and (GC ). For C&C p rn elements, the effective wind area in Figures 30.3-1 through 30.3-7, 30.4-1, 30.5-1, and 30.7-1 through 30.7-3 is the span length multiplied by an effective width that need not be less than one- third the span length. For rooftop solar arrays, the effective wind area in Figure 29.4-7 is equal to the tributary area for the structural element being considered, except that the width of the effective wind area need not be less than one-third its length. For cladding fasteners, the effective wind area shall not be greater than the area that is tributary to an individual fastener. ENVELOPE PROCEDURE: A procedure for determining wind load cases on buildings in which pseudoexternal pressure coefficients are derived from past wind tunnel testing of proto- typical building models successively rotated through 360 degrees, such that the pseudopressure cases produce key struc- tural actions (e.g., uplift, horizontal shear, and bending moments) that envelop their maximum values among all possible wind directions. ESCARPMENT: With respect to topographic effects in Section 26.8, a cliff or steep slope generally separating two levels or gently sloping areas (see Figure 26.8-1). Also known as a scarp. FREE ROOF: A roof with a configuration generally con- forming to those shown in Figures 27.3-4 through 27.3-6 (mono- slope, pitched, or troughed) in an open building with no enclos- ing walls underneath the roof surface. GLAZING: Glass or transparent or translucent plastic sheet used in windows, doors, skylights, or curtain walls. GLAZING, IMPACT-RESISTANT: Glazing that has been shown by testing to withstand the impact of test missiles. See Section 26.12.3.2.", "conditions": [], "then": "", "else": null, "exceptions": []}, "cross_references": [], "metadata": {"extracted_by": "auto", "qc_status": "pending", "qc_notes": null}}, {"id": "ASCE7-22-26.2-D3", "type": "definition", "source": {"standard": "ASCE 7-22", "chapter": 26, "section": "26.2", "citation": "Section 26.2", "page": 3}, "title": "Definition: HILL", "description": "", "data": {"term": "HILL", "definition": "With respect to topographic effects in Section 26.8, a land surface characterized by strong relief in any horizontal direction (see Figure 26.8-1). HURRICANE-PRONE REGIONS: Areas vulnerable to hur- ricanes; in the United States and its territories, these are defined as"}, "cross_references": [], "metadata": {"extracted_by": "auto", "qc_status": "pending", "qc_notes": null}}, {"id": "ASCE7-22-26.2-T13", "type": "provision", "source": {"standard": "ASCE 7-22", "chapter": 26, "section": "26.2", "citation": "Section 26.2", "page": 3}, "title": "Text in Section 26.2", "description": "", "data": {"rule": "1. The US Atlantic Ocean and Gulf of Mexico coasts where the basic wind speed for Risk Category II buildings is greater than 115 mi/h (51.4 m/s); and 2. Hawaii, Puerto Rico, Guam, US Virgin Islands, Northern Mariana Islands, and American Samoa.", "conditions": [], "then": "", "else": null, "exceptions": []}, "cross_references": [], "metadata": {"extracted_by": "auto", "qc_status": "pending", "qc_notes": "unclassified"}}, {"id": "ASCE7-22-26.2-D18", "type": "definition", "source": {"standard": "ASCE 7-22", "chapter": 26, "section": "26.2", "citation": "Section 26.2", "page": 3}, "title": "Definition: PROTECTIVE SYSTEM", "description": "", "data": {"term": "PROTECTIVE SYSTEM", "definition": "Construction that has been shown by testing to withstand the impact of test missiles and that is applied, attached, or locked over exterior glazing. See Section 26.12.3.2."}, "cross_references": [], "metadata": {"extracted_by": "auto", "qc_status": "pending", "qc_notes": "split_from_text"}}, {"id": "ASCE7-22-26.2-D19", "type": "definition", "source": {"standard": "ASCE 7-22", "chapter": 26, "section": "26.2", "citation": "Section 26.2", "page": 3}, "title": "Definition: MAIN WIND FORCE RESISTING SYSTEM (MWFRS)", "description": "", "data": {"term": "MAIN WIND FORCE RESISTING SYSTEM (MWFRS)", "definition": "An assemblage of structural elements assigned to provide support and stability for the overall building or other structure. The system generally receives wind loading from more than one surface. MEAN ROOF HEIGHT, h: The average of the roof eave height and the height to the highest point on the roof surface, except that, for roof angles less than or equal to 10 degrees, the mean roof height is permitted to be taken as the roof eave height."}, "cross_references": [], "metadata": {"extracted_by": "auto", "qc_status": "pending", "qc_notes": "split_from_text"}}, {"id": "ASCE7-22-26.2-D20", "type": "definition", "source": {"standard": "ASCE 7-22", "chapter": 26, "section": "26.2", "citation": "Section 26.2", "page": 3}, "title": "Definition: OPENINGS", "description": "", "data": {"term": "OPENINGS", "definition": "Holes that allow air to ow through the building envelope during a design wind event."}, "cross_references": [], "metadata": {"extracted_by": "auto", "qc_status": "pending", "qc_notes": "split_from_text"}}, {"id": "ASCE7-22-26.2-D21", "type": "definition", "source": {"standard": "ASCE 7-22", "chapter": 26, "section": "26.2", "citation": "Section 26.2", "page": 3}, "title": "Definition: RECOGNIZED LITERATURE", "description": "", "data": {"term": "RECOGNIZED LITERATURE", "definition": "Published research nd- ings and technical papers that are approved."}, "cross_references": [], "metadata": {"extracted_by": "auto", "qc_status": "pending", "qc_notes": "split_from_text"}}, {"id": "ASCE7-22-26.2-D22", "type": "definition", "source": {"standard": "ASCE 7-22", "chapter": 26, "section": "26.2", "citation": "Section 26.2", "page": 3}, "title": "Definition: RIDGE", "description": "", "data": {"term": "RIDGE", "definition": "With respect to topographic effects in Section 26.8, an elongated crest of a hill characterized by strong relief in two directions (see Figure 26.8-1)."}, "cross_references": [], "metadata": {"extracted_by": "auto", "qc_status": "pending", "qc_notes": "split_from_text"}}, {"id": "ASCE7-22-26.2-D23", "type": "definition", "source": {"standard": "ASCE 7-22", "chapter": 26, "section": "26.2", "citation": "Section 26.2", "page": 3}, "title": "Definition: ROOFTOP SOLAR PANEL", "description": "", "data": {"term": "ROOFTOP SOLAR PANEL", "definition": "A device to receive solar radiation and convert it into electricity or heat energy. Typically, this is a photovoltaic module or solar thermal panel."}, "cross_references": [], "metadata": {"extracted_by": "auto", "qc_status": "pending", "qc_notes": "split_from_text"}}, {"id": "ASCE7-22-26.2-D24", "type": "definition", "source": {"standard": "ASCE 7-22", "chapter": 26, "section": "26.2", "citation": "Section 26.2", "page": 3}, "title": "Definition: SOLAR ARRAY", "description": "", "data": {"term": "SOLAR ARRAY", "definition": "Any number of rooftop solar panels grouped closely together. WIND-"}, "cross_references": [], "metadata": {"extracted_by": "auto", "qc_status": "pending", "qc_notes": "split_from_text"}}, {"id": "ASCE7-22-26.2-D25", "type": "definition", "source": {"standard": "ASCE 7-22", "chapter": 26, "section": "26.2", "citation": "Section 26.2", "page": 3}, "title": "Definition: BORNE DEBRIS REGIONS", "description": "", "data": {"term": "BORNE DEBRIS REGIONS", "definition": "Areas within hurri- cane-prone regions where impact protection is required for glazed openings. See Section 26.12.3."}, "cross_references": [], "metadata": {"extracted_by": "auto", "qc_status": "pending", "qc_notes": "split_from_text"}}, {"id": "ASCE7-22-26.2-D26", "type": "definition", "source": {"standard": "ASCE 7-22", "chapter": 26, "section": "26.2", "citation": "Section 26.2", "page": 3}, "title": "Definition: WIND TUNNEL PROCEDURE", "description": "", "data": {"term": "WIND TUNNEL PROCEDURE", "definition": "A procedure for determin- ing wind loads on buildings and other structures in which pressures and/or forces and moments are determined for each wind direction considered, from a model of the building or other structure and its surroundings, in accordance with Chapter 31."}, "cross_references": [], "metadata": {"extracted_by": "auto", "qc_status": "pending", "qc_notes": "split_from_text"}}, {"id": "ASCE7-22-26.2-P2", "type": "provision", "source": {"standard": "ASCE 7-22", "chapter": 26, "section": "26.2", "citation": "Section 26.2", "page": 3}, "title": "Provision in Section 26.2", "description": "", "data": {"rule": "IMPACT-PROTECTIVE SYSTEM: Construction that has been shown by testing to withstand the impact of test missiles and that is applied, attached, or locked over exterior glazing. See Section 26.12.3.2. MAIN WIND FORCE RESISTING SYSTEM (MWFRS): An assemblage of structural elements assigned to provide support and stability for the overall building or other structure. The system generally receives wind loading from more than one surface. MEAN ROOF HEIGHT, h: The average of the roof eave height and the height to the highest point on the roof surface, except that, for roof angles less than or equal to 10 degrees, the mean roof height is permitted to be taken as the roof eave height. OPENINGS: Holes that allow air to ow through the building envelope during a design wind event. RECOGNIZED LITERATURE: Published research nd- ings and technical papers that are approved. RIDGE: With respect to topographic effects in Section 26.8, an elongated crest of a hill characterized by strong relief in two directions (see Figure 26.8-1). ROOFTOP SOLAR PANEL: A device to receive solar radiation and convert it into electricity or heat energy. Typically, this is a photovoltaic module or solar thermal panel. SOLAR ARRAY: Any number of rooftop solar panels grouped closely together. WIND-BORNE DEBRIS REGIONS: Areas within hurri- cane-prone regions where impact protection is required for glazed openings. See Section 26.12.3. WIND TUNNEL PROCEDURE: A procedure for determin- ing wind loads on buildings and other structures in which pressures and/or forces and moments are determined for each wind direction considered, from a model of the building or other structure and its surroundings, in accordance with Chapter 31.", "conditions": [], "then": "", "else": null, "exceptions": []}, "cross_references": [], "metadata": {"extracted_by": "auto", "qc_status": "pending", "qc_notes": null}}, {"id": "ASCE7-22-26.3-H1", "type": "provision", "source": {"standard": "ASCE 7-22", "chapter": 26, "section": "26.3", "citation": "Section 26.3", "page": 3}, "title": "26.3 SYMBOLS", "description": conditions": [], "then": "", "else": null, "exceptions": []}, "cross_references": [], "metadata": {"extracted_by": "auto", "qc_status": "pending", "qc_notes": "unclassified"}}, {"id": "ASCE7-22-26.5-T50", "type": "provision", "source": {"standard": "ASCE 7-22", "chapter": 26, "section": "26.5", "citation": "Section 26.5", "page": 13}, "title": "Text in Section 26.5", "description": "", "data": {"rule": "Figure 26.5-1D (Continued). Basic wind speeds for Risk Category IV buildings and other structures.", "conditions": [], "then": "", "else": null, "exceptions": []}, "cross_references": [], "metadata": {"extracted_by": "auto", "qc_status": "pending", "qc_notes": "unclassified"}}, {"id": "ASCE7-22-26.5-P23", "type": "provision", "source": {"standard": "ASCE 7-22", "chapter": 26, "section": "26.5", "citation": "Section 26.5", "page": 14}, "title": "Provision in Section 26.5", "description": "", "data": {"rule": "Basic wind speeds for Hawaii, US Virgin Islands, and Puerto Rico shall be determined by using the ASCE Wind Design Geodatabase. The ASCE Wind Design Geodatabase is available at the ASCE 7 Hazard Tool (https://asce7hazardtool.online), or approved equivalent. The wind shall be assumed to come from any horizontal direction. The basic wind speed shall be increased where records or experience indicate that the wind speeds are higher than those re ected in Figure 26.5-1.", "conditions": [], "then": "", "else": null, "exceptions": []}, "cross_references": [], "metadata": {"extracted_by": "auto", "qc_status": "pending", "qc_notes": null}}, {"id": "ASCE7-22-26.5-P24", "type": "provision", "source": {"standard": "ASCE 7-22", "chapter": 26, "section": "26.5", "citation": "Section 26.5", "page": 14}, "title": "Provision in Section 26.5", "description": "", "data": {"rule": "26.5.2 Special Wind Regions Mountainous terrain, gorges, and special wind regions shown in Figure 26.5-1 shall be examined for unusual wind conditions. The Authority Having Jurisdiction shall, if necessary, adjust the values given in Figure 26.5-1 to account for higher local wind speeds. Such adjustment shall be based on meteorological information and an estimate of the basic wind speed obtained in accordance with the provisions of Section 26.5.3. Site-speci c values for select special wind regions in the contiguous United States have been included in the ASCE 7 Wind Design Geodatabase. It shall be permitted to use the wind speed values for Special Wind Regions from the ASCE 7 Wind Design Geodatabase (https://asce7hazardtool.online/).", "conditions": [], "then": "", "else": null, "exceptions": []}, "cross_references": [], "metadata": {"extracted_by": "auto", "qc_status": "pending", "qc_notes": null}}, {"id": "ASCE7-22-26.5-P25", "type": "provision", "source": {"standard": "ASCE 7-22", "chapter": 26, "section": "26.5", "citation": "Section 26.5", "page": 14}, "title": "Provision in Section 26.5", "description": "", "data": {"rule": "26.5.3 Estimation of Basic Wind Speeds from Regional Climatic Data In areas outside hurricane-prone regions, regional climatic data shall only be used in lieu of the basic wind speeds given in Figure 26.5-1 when (1) approved extreme- value statistical analysis procedures have been used in reducing the data, and (2) the length of record, sampling error, averaging time, anemometer height, data quality, and terrain exposure of the anemometer have been taken into account. Reduction in basic wind speed below that of Figure 26.5-1 shall be permitted. In hurricane-prone regions, wind speeds derived from simula- tion techniques shall only be used in lieu of the basic wind speeds given in Figure 26.5-1 when approved simulation and extreme- value statistical analysis procedures are used. The use of regional wind-speed data obtained from anemometers is not permitted to de ne the hurricane wind-speed risk along the Gulf and Atlantic coasts, the Caribbean, or Hawaii. When the basic wind speed is estimated from regional climatic data or simulation, the estimate shall correspond to the applicable mean recurrence interval, and the estimate shall be adjusted for equivalence to a 3 s gust wind speed at 33 ft (10 m) above ground in Exposure C.", "conditions": [], "then": "", "else": null, "exceptions": []}, "cross_references": [], "metadata": {"extracted_by": "auto", "qc_status": "pending", "qc_notes": null}}, {"id": "ASCE7-22-26.6-H1", "type": "provision", "source": {"standard": "ASCE 7-22", "chapter": 26, "section": "26.6", "citation": "Section 26.6", "page": 14}, "title": "26.6 WIND DIRECTIONALITY FACTOR", "description": "", "data": {"rule": "26.6 WIND DIRECTIONALITY FACTOR", "conditions": [], "then": "WIND DIRECTIONALITY FACTOR", "else": null, "exceptions": []}, "cross_references": [], "metadata": {"extracted_by": "auto", "qc_status": "pending", "qc_notes": "heading"}}, {"id": "ASCE7-22-26.6-P1", "type": "provision", "source": {"standard": "ASCE 7-22", "chapter": 26, "section": "26.6", "citation": "Section 26.6", "page": 14}, "title": "Provision in Section 26.6", "description": "", "data": {"rule": "The wind directionality factor, K , shall be determined from d Table 26.6-1 and shall be included in the wind loads calculated in Chapters 27 through 30. The effect of wind directionality in determining wind loads in accordance with Chapter 31 shall be based on a rational analysis of the wind speeds conforming to the requirements of Section 26.5.3 and of Section 31.4.3.", "conditions": [], "then": "", "else": null, "exceptions": []}, "cross_references": [], "metadata": {"extracted_by": "auto", "qc_status": "pending", "qc_notes": null}}, {"id": "ASCE7-22-26.7-H1", "type": "provision", "source": {"standard": "ASCE 7-22", "chapter": 26, "section": "26.7", "citation": "Section 26.7", "page": 14}, "title": "26.7 EXPOSURE", "description": "", "data": {"rule": "26.7 EXPOSURE", "conditions": [], "then": "EXPOSURE", "else": null, "exceptions": []}, "cross_references": [], "metadata": {"extracted_by": "auto", "qc_status": "pendi , "source": {"standard": "ASCE 7-22", "chapter": 26, "section": "26.7", "citation": "Section 26.7", "page": 14}, "title": "Provision in Section 26.7", "description": "", "data": {"rule": "the selected wind direction. The exposure in these two sectors shall be determined in accordance with Sections 26.7.2 and 26.7.3, and the exposure the use of which would result in the highest wind loads shall be used to represent the winds from that direction.", "conditions": [], "then": "", "else": null, "exceptions": []}, "cross_references": [], "metadata": {"extracted_by": "auto", "qc_status": "pending", "qc_notes": null}}, {"id": "ASCE7-22-26.7-P5", "type": "provision", "source": {"standard": "ASCE 7-22", "chapter": 26, "section": "26.7", "citation": "Section 26.7", "page": 14}, "title": "Provision in Section 26.7", "description": "", "data": {"rule": "26.7.2 Surface Roughness Categories A ground surface roughness within each 45 degree sector shall be determined for a distance upwind of the site, as defined in Section 26.7.3, from the categories defined in the following text, for the purpose of assigning an exposure category as defined in Section 26.7.3. Surface Roughness B. Urban and suburban areas, wooded areas, or other terrain with numerous, closely spaced obstructions that have the size of single-family dwellings or larger. Surface Roughness C. Open terrain with scattered obstruc- tions that have heights generally less than 30 ft (9.1 m). This category includes at, open country and grasslands. Surface Roughness D. Flat, unobstructed areas and water surfaces. This category includes smooth mud ats, salt ats, and unbroken ice.", "conditions": [], "then": "", "else": null, "exceptions": []}, "cross_references": [], "metadata": {"extracted_by": "auto", "qc_status": "pending", "qc_notes": null}}, {"id": "ASCE7-22-26.7-P6", "type": "provision", "source": {"standard": "ASCE 7-22", "chapter": 26, "section": "26.7", "citation": "Section 26.7", "page": 14}, "title": "Provision in Section 26.7", "description": "", "data": {"rule": "26.7.3 Exposure Categories Exposure B. For buildings or other structures with a mean roof height less than or equal to 30 ft (9.1 m), Exposure B shall apply where the ground surface roughness, as defined by Surface Roughness B, prevails in the upwind direction for a distance greater than 1,500 ft (457 m). For buildings or other structures with a mean roof height greater than 30 ft (9.1 m), Exposure B shall apply where Surface Roughness B prevails in the upwind direction for a distance greater than 2,600 ft (792 m) or 20 times the height of the building or structure, whichever is greater.", "conditions": [], "then": "", "else": null, "exceptions": []}, "cross_references": [], "metadata": {"extracted_by": "auto", "qc_status": "pending", "qc_notes": null}}, {"id": "ASCE7-22-26.7-H2", "type": "provision", "source": {"standard": "ASCE 7-22", "chapter": 26, "section": "26.7", "citation": "Section 26.7", "page": 14}, "title": "STANDARD ASCE/SEI 7-22", "description": "", "data": {"rule": "STANDARD ASCE/SEI 7-22", "conditions": [], "then": "STANDARD ASCE/SEI 7-22", "else": null, "exceptions": []}, "cross_references": [], "metadata": {"extracted_by": "auto", "qc_status": "pending", "qc_notes": "heading"}}, {"id": "ASCE7-22-26.7-P7", "type": "provision", "source": {"standard": "ASCE 7-22", "chapter": 26, "section": "26.7", "citation": "Section 26.7", "page": 15}, "title": "Provision in Section 26.7", "description": "", "data": {"rule": "Exposure C. Exposure C shall apply for all cases where Exposure B or D does not apply. Exposure D. Exposure D shall apply where the ground surface roughness, as defined by Surface Roughness D, pre- vails in the upwind direction for a distance greater than 5,000 ft (1,524 m) or 20 times the building or structure height, whichever is greater. Exposure D shall also apply where the ground surface roughness immediately upwind of the site is B or C, and the building or structure is within a distance of 600 ft (183 m) or 20 times the building or structure height, whichever is greater, from an Exposure D condition as defined in the previous sentence. For a building or structure located in the transition zone between exposure categories, the category resulting in the largest wind forces shall be used. EXCEPTION: An intermediate exposure between the pre- ceding categories is permitted in a transition zone, provided it is determined by a rational analysis method defined in the recog- nized literature.", "conditions": [], "then": "", "else": null, "exceptions": []}, "cross_references": [], "metadata": {"extracted_by": "auto", "qc_status": "pending", "qc_notes": null}}, {"id": "ASCE7-22-26.7.4-H1", "type": "provision", "source": {"standard": "ASCE 7-22", "chapter": 26, "section": "26.7.4", "citation": "Section 26.7.4", "page": 15}, "title": "26.7.4 Exposure Requirements", "description": "", "data": {"rule": "26.7.4 Exposure Requirements", "conditions": [], "then": "Exposure Requirements", "else": null, "exceptions": []}, "cross_references": [], "metadata": {"extracted_by": "auto", "qc_status": "pending", "qc_notes": "heading"}}, {"id": "ASCE7-22-26.7.4-P1", "type": "provision", "source": {"standard": "ASCE 7-22", "chapter": 26, "section": "26.7.4", "citation": "Section 26.7.4", "page": 15}, "title": "Provision in Section 26.7.4", "description": "", "data": {"rule": "26.7.4.1 Directional Procedure (Chapter 27) For each wind direction considered, wind loads for the design of the MWFRS of enclosed and partially enclosed buildings using the Directional Procedure of Chapter 27 shall be based on the exposures as defined in Section 26.7.3. Wind loads for the design of open buildings with monoslope, pitched, or troughed free roofs shall be based on the exposures, as defined in Section 26.7.3, resulting in the highest wind loads for any wind direction at the site.", "conditions": [], "then": "", "else": null, "exceptions": []}, "cross_references": [], "metadata": {"extracted_by" : "Glazing located more than 60 ft (18.3 m) above the ground and more than 30 ft (9.2 m) above aggregate- surfaced roofs, including roofs with gravel or stone ballast, located within 1,500 ft (458 m) of the building shall be permitted to be unprotected."}, "cross_references": [], "metadata": {"extracted_by": "auto", "qc_status": "pending", "qc_notes": null}}, {"id": "ASCE7-22-26.12.3.1-P2", "type": "provision", "source": {"standard": "ASCE 7-22", "chapter": 26, "section": "26.12.3.1", "citation": "Section 26.12.3.1", "page": 19}, "title": "Provision in Section 26.12.3.1", "description": "", "data": {"rule": "26.12.3.2 Protection Requirements for Glazed Openings Glazing in buildings requiring protection shall be impact resistant or be protected with an impact-protective system. Impact-protective systems and impact-resistant glazing shall be subjected to missile test and cyclic pressure differential tests in accordance with ASTM E1996 as applicable. Testing to demon- strate compliance with ASTM E1996 shall be in accordance with ASTM E1886. Impact-resistant glazing and impact-protective systems shall comply with the pass/fail criteria of Section 7 of ASTM E1996 based on the missile required by Table 3 or Table 4 of ASTM E1996. Glazing in sectional doors, rolling doors, and exible doors shall be subjected to missile tests and cyclic pressure differential tests in accordance with ANSI/DASMA 115 as applicable. Glazing and impact-protective systems in buildings and other structures classified as Risk Category IV in accordance with Section 1.5 shall comply with the \u201cenhanced protection\u201d requirements of Table 3 of ASTM E1996. Glazing and impact- protective systems in all other buildings covered by Section 26.12.3.1 shall comply with the \u201cbasic protection\u201d requirements of Table 3 of ASTM E1996.", "conditions": [], "then": "", "else": null, "exceptions": []}, "cross_references": [], "metadata": {"extracted_by": "auto", "qc_status": "pending", "qc_notes": nu let activeTypes = new Set(['provision','definition','formula','table','figure']);
let selIdx = -1;

// Build filters
const types = {};
DATA.forEach(e => { types[e.type] = (types[e.type]||0)+1; });
const filtersEl = document.getElementById('filters');
Object.entries(types).sort((a,b)=>b[1]-a[1]).forEach(([t,c]) => {
  const btn = document.createElement('button');
  btn.className = 'fbtn on';
  btn.textContent = t + ' ' + c;
  btn.dataset.type = t;
  btn.onclick = () => {
    if(activeTypes.has(t)){activeTypes.delete(t);btn.classList.remove('on');}
    else{activeTypes.add(t);btn.classList.add('on');}
    render();
  };
  filtersEl.appendChild(btn);
});
document.getElementById('typeCounts').textContent = Object.entries(types).map(([t,c])=>t+':'+c).join(' ');

function getFiltered(){
  const q = document.getElementById('search').value.toLowerCase();
  return DATA.filter(e => {
    if(!activeTypes.has(e.type)) return false;
    if(q && !JSON.stringify(e).toLowerCase().includes(q)) return false;
    return true;
  });
}

function render(){
  const filtered = getFiltered();
  document.getElementById('total').textContent = DATA.length;
  document.getElementById('showing').textContent = filtered.length;
  const items = document.getElementById('items');
  items.innerHTML = '';
  filtered.forEach((e,i) => {
    const d = document.createElement('div');
    d.className = 'item' + (i===selIdx?' sel':'');
    d.innerHTML = '<span class="tag tag-'+e.type+'">'+e.type+'</span><div><div class="title">'+esc(e.title||'')+'</div><div class="id">'+esc(e.id)+' · p'+((e.source||{}).page||'?')+'</div></div>';
    d.onclick = () => { selIdx=i; render(); showDetail(e); };
    items.appendChild(d);
  });
}

function showDetail(e){
  const d = document.getElementById('detail');
  let html = '<h2>'+esc(e.id)+'</h2>';
  html += '<div class="meta">'+esc(e.type)+' · Section '+(e.source?.section||'?')+' · Page '+(e.source?.page||'?')+'</div>';
  
  if(e.type==='provision'){
    html += '<div class="section"><div class="lbl">RULE (exact code text)</div><div class="rule">'+esc(e.data?.rule||'')+'</div></div>';
    if(e.data?.conditions?.length){
      html += '<div class="section"><div class="lbl">CONDITIONS</div><pre>'+esc(JSON.stringify(e.data.conditions,null,2))+'</pre></div>';
    }
  } else if(e.type==='definition'){
    html += '<div class="section"><div class="def"><div class="term">'+esc(e.data?.term||'')+'</div><div class="deftext">'+esc(e.data?.definition||'')+'</div></div></div>';
  } else if(e.type==='formula'){
    html += '<div class="section"><div class="lbl">EXPRESSION</div><div class="expr">'+esc(e.data?.expression||'')+'</div></div>';
    if(e.data?.parameters && Object.keys(e.data.parameters).length){
      html += '<div class="section"><div class="lbl">PARAMETERS</div><pre>'+esc(JSON.stringify(e.data.parameters,null,2))+'</pre></div>';
    }
  } else if(e.type==='table'){
    html += '<div class="section"><div class="lbl">COLUMNS</div><pre>'+esc(JSON.stringify(e.data?.columns,null,2))+'</pre></div>';
    html += '<div class="section"><div class="lbl">ROWS (first 10)</div><pre>'+esc(JSON.stringify((e.data?.rows||[]).slice(0,10),null,2))+'</pre></div>';
  } else if(e.type==='figure'){
    html += '<div class="section"><div class="lbl">DESCRIPTION</div><div class="rule">'+esc(e.data?.description||'')+'</div></div>';
  }
  
  html += '<div class="section"><div class="lbl">FULL JSON</div><pre>'+esc(JSON.stringify(e,null,2))+'</pre></div>';
  d.innerHTML = html;
}

function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML;}
render();
document.getElementById('search').focus();
</script></body></html>
